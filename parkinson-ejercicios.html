<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NeuroFit — Ejercicios Parkinson</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e1018;
      --card: #161924;
      --card2: #1c2030;
      --border: #252840;
      --accent: #7c6af7;
      --accent2: #4fc3f7;
      --success: #56c768;
      --warn: #f5a623;
      --text: #e4e4f0;
      --dim: #6b6d8a;
      --r: 18px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      font-size: 17px;
      line-height: 1.5;
    }

    /* HEADER */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .app-name { font-size: 1.25em; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .app-name span { color: var(--accent2); }
    .session-badge {
      background: rgba(124,106,247,0.15);
      color: var(--accent);
      border: 1px solid rgba(124,106,247,0.35);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8em;
      font-weight: 700;
    }

    /* MAIN */
    main { padding: 20px 18px 40px; max-width: 560px; margin: 0 auto; }

    /* PROGRESS */
    .progress-wrap { margin-bottom: 22px; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.82em;
      color: var(--dim);
      margin-bottom: 8px;
    }
    .bar-bg { background: var(--card); border-radius: 6px; height: 7px; overflow: hidden; }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 6px;
      transition: width 0.6s ease;
    }

    /* EXERCISE CARD */
    .ex-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 26px 22px;
      margin-bottom: 16px;
    }
    .cat-badge {
      display: inline-block;
      background: rgba(124,106,247,0.12);
      color: var(--accent);
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.72em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }
    .ex-icon { font-size: 2.6em; display: block; margin-bottom: 10px; }
    .ex-name { font-size: 1.55em; font-weight: 800; color: #fff; margin-bottom: 10px; line-height: 1.2; }
    .ex-desc { font-size: 1em; color: #a0a0c0; line-height: 1.65; margin-bottom: 16px; }
    .ex-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      background: rgba(79,195,247,0.1);
      color: var(--accent2);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 0.8em;
      font-weight: 600;
    }
    .chip.hard { background: rgba(245,166,35,0.1); color: var(--warn); }
    .evidence-bar {
      margin-top: 14px;
      background: rgba(124,106,247,0.07);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 9px 12px;
      font-size: 0.75em;
      color: var(--dim);
      line-height: 1.5;
    }
    .evidence-bar strong { color: var(--accent); }

    /* COUNTER */
    .counter-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 24px 22px;
      margin-bottom: 16px;
      text-align: center;
    }
    .counter-label { font-size: 0.88em; color: var(--dim); margin-bottom: 18px; }
    .dots { display: flex; justify-content: center; gap: 18px; margin-bottom: 22px; }
    .dot {
      width: 54px; height: 54px;
      border-radius: 50%;
      border: 2.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5em;
      transition: all 0.25s;
      color: transparent;
    }
    .dot.active { border-color: var(--accent); background: rgba(124,106,247,0.1); }
    .dot.done {
      background: var(--success);
      border-color: var(--success);
      color: white;
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    /* BUTTONS */
    .btn-hecho {
      width: 100%;
      padding: 22px 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: var(--r);
      font-size: 1.5em;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.1s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 24px rgba(124,106,247,0.35);
    }
    .btn-hecho:active { transform: scale(0.97); }
    .btn-hecho:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

    /* CELEBRATION */
    #celebration {
      display: none;
      background: var(--card);
      border: 1px solid var(--success);
      border-radius: var(--r);
      padding: 36px 22px;
      margin-bottom: 16px;
      text-align: center;
    }
    #celebration.show {
      display: block;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .cel-emoji { font-size: 3.2em; margin-bottom: 10px; }
    .cel-title { font-size: 1.6em; font-weight: 800; color: var(--success); margin-bottom: 6px; }
    .cel-sub { color: var(--dim); margin-bottom: 26px; font-size: 0.95em; }
    .btn-sig {
      width: 100%;
      padding: 20px 16px;
      background: var(--success);
      color: white;
      border: none;
      border-radius: var(--r);
      font-size: 1.4em;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 20px rgba(86,199,104,0.3);
    }
    .btn-sig:active { transform: scale(0.97); }

    /* SESSION DONE */
    #session-done {
      display: none;
      background: var(--card);
      border: 1px solid var(--accent);
      border-radius: var(--r);
      padding: 40px 22px;
      text-align: center;
    }
    #session-done.show { display: block; animation: fadeUp 0.4s ease; }
    .done-emoji { font-size: 4em; margin-bottom: 12px; }
    .done-title { font-size: 1.7em; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
    .done-sub { color: var(--dim); font-size: 0.95em; line-height: 1.6; }

    /* HISTORY */
    #history { margin-top: 8px; }
    .hist-title { font-size: 0.8em; color: var(--dim); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; padding-left: 2px; }
    .hist-list { display: flex; flex-direction: column; gap: 7px; }
    .hist-item {
      background: rgba(86,199,104,0.07);
      border: 1px solid rgba(86,199,104,0.18);
      border-radius: 11px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88em;
    }
    .hist-icon { font-size: 1.2em; }
    .hist-name { font-weight: 600; color: var(--text); }
    .hist-cat { color: var(--dim); font-size: 0.85em; }
    .hist-check { margin-left: auto; color: var(--success); font-size: 1.1em; }

    /* QUEUE INFO */
    .queue-info {
      text-align: center;
      font-size: 0.78em;
      color: var(--dim);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<header>
  <div class="app-name">Neuro<span>Fit</span></div>
  <div class="session-badge" id="session-badge">Hoy: 0 ejercicios</div>
</header>

<main>
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progress-label">Sesión de hoy</span>
      <span id="progress-count">0 completados</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
  </div>

  <div class="queue-info" id="queue-info"></div>

    <div class="ex-name" id="ex-name"></div>
    <div class="ex-desc" id="ex-desc"></div>
    <div class="ex-chips" id="ex-chips"></div>
    <div class="evidence-bar" id="ex-evidence"></div>
  </div>

  <!-- COUNTER -->
  <div class="counter-card" id="counter-card">
    <div class="counter-label">Marca cada vez que termines</div>
    <div class="dots" id="dots">
      <div class="dot active" id="dot-0">✓</div>
      <div class="dot" id="dot-1">✓</div>
      <div class="dot" id="dot-2">✓</div>
    </div>
    <button class="btn-hecho" id="btn-hecho" onclick="markDone()">✓ HECHO</button>
  </div>

  <!-- CELEBRATION -->
  <div id="celebration">
    <div class="cel-emoji" id="cel-emoji">🎉</div>
    <div class="cel-title" id="cel-title">¡3 de 3!</div>
    <div class="cel-sub" id="cel-sub"></div>
    <button class="btn-sig" onclick="nextExercise()">Siguiente ejercicio →</button>
  </div>

  <!-- SESSION DONE -->
  <div id="session-done">
    <div class="done-emoji">🧠</div>
    <div class="done-title">¡Sesión completa!</div>
    <div class="done-sub" id="done-sub">Completaste todos los ejercicios de hoy.<br>Mañana el circuito rota automáticamente.</div>
  </div>

  <!-- HISTORY -->
  <div id="history">
    <div class="hist-title" id="hist-title"></div>
    <div class="hist-list" id="hist-list"></div>
  </div>
</main>

    ev:'Entrenamiento de amplitud gráfica — conecta movimiento motor grande con tarea fine-motor.' },

  // POSTURA
  { id:'pos1', cat:'Postura', short:'Stretching', icon:'🏹', diff:'Fácil',
    name:'Apertura de Pecho', dur:'2 min', reps:'3 veces 30 segundos',
    desc:'Parado en un marco de puerta, coloca antebrazos en el marco. Inclínate hacia adelante suavemente hasta sentir apertura en el pecho. Mantén 30 seg. Respira profundo.',
    ev:'Contraresta cifosis anterior — postura en anteflexión es característica del PD. Abre vía respiratoria.' },
  { id:'pos2', cat:'Postura', short:'Stretching', icon:'🌟', diff:'Fácil',
    name:'Postura Estrella', dur:'2 min', reps:'4 veces 30 segundos',
    desc:'Párate con pies separados, brazos en X como estrella. Mantén 30 seg. Activa todo: empuja piernas al piso, extiende brazos al cielo, saca pecho.',
    ev:'Postura de expansión — activa propioceptores y contraresta postura flexionada del PD.' },
];

// ─── SESSION GOALS ──────────────────────────────────────────────────────────
const DAILY_GOAL = 8; // ejercicios por sesión

// ─── STATE ──────────────────────────────────────────────────────────────────
let state = {
  queue: [],
  queueIdx: 0,
  repCount: 0,
  todayLog: [],
  todayDate: '',
};

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function saveState() {
  localStorage.setItem('nf_state', JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem('nf_state');
  if (raw) {
    try { state = JSON.parse(raw); } catch(e) {}
  }
  // New day: reset log but keep queue position
  const today = todayStr();
  if (state.todayDate !== today) {
    state.todayLog = [];
    state.todayDate = today;
    state.repCount = 0;
    saveState();
  }
  // Init queue if empty
  if (!state.queue || state.queue.length === 0) {
    state.queue = shuffle(POOL.map(e => e.id));
    state.queueIdx = 0;
    saveState();
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function currentExercise() {
  if (state.queueIdx >= state.queue.length) {
    state.queue = shuffle(POOL.map(e => e.id));
    state.queueIdx = 0;
    saveState();
  }
  const id = state.queue[state.queueIdx];
  return POOL.find(e => e.id === id) || POOL[0];
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  const done = state.todayLog.length;
  const pct = Math.min(100, Math.round((done / DAILY_GOAL) * 100));
  const sessionDone = done >= DAILY_GOAL;

  // Header badge
  document.getElementById('session-badge').textContent = `Hoy: ${done} ejercicio${done !== 1 ? 's' : ''}`;

  // Progress
  document.getElementById('progress-label').textContent = sessionDone ? '¡Meta de hoy alcanzada!' : `Meta: ${DAILY_GOAL} ejercicios hoy`;
  document.getElementById('progress-count').textContent = `${done} / ${DAILY_GOAL}`;
  document.getElementById('bar-fill').style.width = pct + '%';

  // Queue info
  document.getElementById('queue-info').textContent =
    `Ejercicio ${(state.queueIdx % POOL.length) + 1} de ${POOL.length} en rotación`;

  if (sessionDone) {
    showSessionDone(done);
    return;
  }

  // Current exercise
  const ex = currentExercise();
  document.getElementById('ex-cat').textContent = ex.cat;
  document.getElementById('ex-icon').textContent = ex.icon;
  document.getElementById('ex-name').textContent = ex.name;
  document.getElementById('ex-desc').textContent = ex.desc;
  document.getElementById('ex-evidence').innerHTML = `<strong>Evidencia:</strong> ${ex.ev}`;

  const chips = document.getElementById('ex-chips');
  chips.innerHTML = `
    <div class="chip">⏱ ${ex.dur}</div>
    <div class="chip">🔁 ${ex.reps}</div>
    <div class="chip ${ex.diff === 'Difícil' ? 'hard' : ''}">${ex.diff}</div>
  `;

  // Dots
  for (let i = 0; i < 3; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.className = 'dot' + (i < state.repCount ? ' done' : (i === state.repCount ? ' active' : ''));
  }

  // Button
  document.getElementById('btn-hecho').disabled = state.repCount >= 3;

  // Celebration
  if (state.repCount >= 3) {
    showCelebration(ex);
  } else {
    document.getElementById('celebration').classList.remove('show');
    document.getElementById('ex-card').style.display = '';
    document.getElementById('counter-card').style.display = '';
  }

  document.getElementById('session-done').classList.remove('show');

  // History
  renderHistory();
}

function showCelebration(ex) {
  document.getElementById('ex-card').style.display = 'none';
  document.getElementById('counter-card').style.display = 'none';
  const emojis = ['🎉', '⭐', '🏆', '💪', '🧠', '🌟'];
  document.getElementById('cel-emoji').textContent = emojis[Math.floor(state.todayLog.length % emojis.length)];
  document.getElementById('cel-title').textContent = '¡' + ex.name + ' completado!';
  document.getElementById('cel-sub').textContent = `3 de 3 ✓  —  ${state.todayLog.length} ejercicio${state.todayLog.length !== 1 ? 's' : ''} hoy`;
  document.getElementById('celebration').classList.add('show');
}

function showSessionDone(count) {
  document.getElementById('ex-card').style.display = 'none';
  document.getElementById('counter-card').style.display = 'none';
  document.getElementById('celebration').classList.remove('show');
  document.getElementById('queue-info').textContent = '';
  document.getElementById('done-sub').textContent =
    `Completaste ${count} ejercicios hoy. ¡Excelente trabajo!\nMañana el circuito continúa desde donde quedaste.`;
  document.getElementById('session-done').classList.add('show');
  renderHistory();
}

function renderHistory() {
  const hist = state.todayLog;
  const title = document.getElementById('hist-title');
  const list = document.getElementById('hist-list');

  if (hist.length === 0) {
    title.textContent = '';
    list.innerHTML = '';
    return;
  }

  title.textContent = `Completados hoy (${hist.length})`;
  list.innerHTML = hist.map(entry => {
    const ex = POOL.find(e => e.id === entry.id) || { icon: '✓', name: entry.id, cat: '' };
    return `<div class="hist-item">
      <span class="hist-icon">${ex.icon}</span>
      <div>
        <div class="hist-name">${ex.name}</div>
        <div class="hist-cat">${ex.cat}</div>
      </div>
      <span class="hist-check">✓</span>
    </div>`;
  }).join('');
}

// ─── ACTIONS ────────────────────────────────────────────────────────────────
function markDone() {
  if (state.repCount >= 3) return;
  state.repCount++;

  // Animate dot
  const dot = document.getElementById('dot-' + (state.repCount - 1));
  dot.className = 'dot done';

  if (state.repCount < 3) {
    // Activate next dot
    const next = document.getElementById('dot-' + state.repCount);
    if (next) next.className = 'dot active';
    saveState();
  } else {
    // Log completion
    const ex = currentExercise();
    state.todayLog.push({ id: ex.id, ts: Date.now() });
    saveState();
    render();
  }
}

function nextExercise() {
  state.queueIdx++;
  state.repCount = 0;
  if (state.queueIdx >= state.queue.length) {
    state.queue = shuffle(POOL.map(e => e.id));
    state.queueIdx = 0;
  }
  saveState();
  // Restore card/counter visibility
  document.getElementById('ex-card').style.display = '';
  document.getElementById('counter-card').style.display = '';
  document.getElementById('celebration').classList.remove('show');
  render();
}

// ─── INIT ───────────────────────────────────────────────────────────────────
loadState();
render();
</script>
